# =============================================================================
# IBKR Trading Bot Configuration
# =============================================================================
# Copy this file to config.yaml and adjust values for your setup.
# Sensitive values (passwords, tokens, webhook URLs) can be overridden via
# environment variables using the TRADING_BOT_ prefix with __ as nested delimiter.
# Example: TRADING_BOT_DATABASE__URL overrides database.url
# =============================================================================

# -----------------------------------------------------------------------------
# Connection Settings — IBKR TWS or IB Gateway connectivity
# -----------------------------------------------------------------------------
connection:
  # Connection mode: "gateway" (IB Gateway) or "tws" (Trader Workstation)
  mode: "gateway"
  # Host where TWS/Gateway is running
  host: "127.0.0.1"
  # Port mapping:
  #   TWS live: 7496, TWS paper: 7497
  #   Gateway live: 4001, Gateway paper: 4002
  port: 4002
  # Unique client ID for this bot instance (use different IDs for multiple bots)
  client_id: 1
  # Connection timeout in seconds
  timeout: 30
  # Read-only mode: true prevents order submission (useful for monitoring only)
  readonly: false

# -----------------------------------------------------------------------------
# Strategies — Trading strategy configuration
# -----------------------------------------------------------------------------
# Each strategy has:
#   enabled: bool — whether the strategy runs at startup
#   frequency: evaluation interval (tick, 1min, 5min, 15min, 1hour, daily, weekly)
#   symbols: list of instruments to trade
#   asset_classes: allowed asset classes (equity, option, future, forex)
#   parameters: strategy-specific tuning parameters
# -----------------------------------------------------------------------------
strategies:
  momentum:
    enabled: true
    frequency: "15min"
    symbols:
      - "AAPL"
      - "MSFT"
      - "GOOGL"
      - "AMZN"
    asset_classes:
      - "equity"
    parameters:
      # Number of bars to measure momentum over
      lookback_period: 20
      # Minimum momentum score to trigger a signal (0.0 to 1.0)
      momentum_threshold: 0.02

  ma_crossover:
    enabled: true
    frequency: "1hour"
    symbols:
      - "SPY"
      - "QQQ"
      - "IWM"
    asset_classes:
      - "equity"
    parameters:
      # Fast moving average period (bars)
      fast_period: 10
      # Slow moving average period (bars)
      slow_period: 30
      # Moving average type: "sma" or "ema"
      ma_type: "ema"

  mean_reversion:
    enabled: true
    frequency: "5min"
    symbols:
      - "SPY"
      - "QQQ"
    asset_classes:
      - "equity"
    parameters:
      # Lookback window for mean calculation (bars)
      lookback_period: 20
      # Z-score threshold to trigger entry (standard deviations from mean)
      z_score_threshold: 2.0

  # --- Uncomment and configure additional strategies as needed ---

  wheel:
    enabled: false
    frequency: "15min"
    symbols:
      - "AAPL"
      - "MSFT"
      - "GOOGL"
    asset_classes:
      - "option"
    parameters:
      # Target delta for strike selection (probability proxy)
      target_delta: 0.30
      # Minimum days to expiration for new positions
      min_dte: 30
      # Maximum days to expiration for new positions
      max_dte: 45
      # Days remaining to trigger roll evaluation
      roll_dte_threshold: 7
      # VIX level above which new put-selling is suppressed
      vix_high_threshold: 30.0
      # VIX level below which put-selling resumes (hysteresis)
      vix_reentry_threshold: 25.0
      # Maximum concurrent short option positions per symbol
      max_positions_per_symbol: 1

