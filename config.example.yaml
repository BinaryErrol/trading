# -----------------------------------------------------------------------------
# Risk Management — Position limits, drawdown controls, diversification
# -----------------------------------------------------------------------------
risk:
  # Maximum position size per instrument as fraction of total portfolio
  max_position_pct: 0.05
  # Maximum portfolio drawdown from peak equity before halting all trading
  max_drawdown_pct: 0.10
  # Maximum daily loss as fraction of portfolio before halting for the day
  max_daily_loss_pct: 0.02
  # Maximum fraction of capital in any single sector
  max_sector_concentration: 0.25
  # Correlation threshold: limit exposure to positions correlated above this
  max_correlation: 0.7
  # VaR confidence level (0.95 = 95th percentile)
  var_confidence: 0.95
  # Number of historical trading days for VaR calculation
  var_lookback_days: 252
  # Stop-loss configuration
  stop_loss:
    # Stop type: "atr_trailing" (ATR-based trailing stop) or "fixed_pct" (fixed percentage)
    type: "atr_trailing"
    # ATR multiplier for trailing stop distance (used when type is atr_trailing)
    atr_multiplier: 2.0
    # Fixed stop-loss percentage below entry (used when type is fixed_pct)
    fixed_pct: 0.03

# -----------------------------------------------------------------------------
# Capital Allocation — How capital is distributed across strategies
# -----------------------------------------------------------------------------
capital:
  # Total capital available for trading (USD)
  total_capital: 100000.00
  # Allocation mode: "equal_weight", "fixed_amount", or "percentage"
  #   equal_weight: split evenly across all enabled strategies
  #   fixed_amount: assign specific dollar amounts per strategy
  #   percentage: assign specific percentages per strategy
  allocation_mode: "equal_weight"
  # Per-strategy allocations (used with fixed_amount or percentage modes)
  # For fixed_amount mode: values are dollar amounts
  # For percentage mode: values are fractions (must sum to <= 1.0)
  allocations:
    momentum: 0.34
    ma_crossover: 0.33
    mean_reversion: 0.33

# -----------------------------------------------------------------------------
# Alerts — Notification channels and event routing
# -----------------------------------------------------------------------------
alerts:
  channels:
    slack:
      enabled: false
      # Slack incoming webhook URL (override via TRADING_BOT_ALERTS__CHANNELS__SLACK__WEBHOOK_URL)
      webhook_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    email:
      enabled: false
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
      smtp_user: "your-email@gmail.com"
      # SMTP password (override via TRADING_BOT_ALERTS__CHANNELS__EMAIL__SMTP_PASSWORD)
      smtp_password: "your-app-password"
      from_email: "your-email@gmail.com"
      to_emails:
        - "alerts@yourdomain.com"
    webhook:
      enabled: false
      # Generic HTTP webhook endpoint
      url: "https://your-webhook-endpoint.com/trading-alerts"
  # Event routing: map event types to notification channels
  # Valid event types: trade_executed, risk_breach, connection_lost, error, daily_report
  routing:
    trade_executed:
      - "slack"
    risk_breach:
      - "slack"
      - "email"
    connection_lost:
      - "slack"
      - "email"
    error:
      - "slack"
      - "email"
    daily_report:
      - "email"

# -----------------------------------------------------------------------------
# Backtesting — Simulation parameters for strategy backtests
# -----------------------------------------------------------------------------
backtesting:
  # Slippage model in basis points (1 bps = 0.01%)
  slippage_bps: 5
  # Commission cost per share (USD)
  commission_per_share: 0.005
  # Market impact in basis points
  market_impact_bps: 2
  # Data source for historical data: "ibkr" (IBKR Historical Data API) or "csv" (local files)
  data_source: "ibkr"
  # Directory containing CSV historical data files (used when data_source is "csv")
  csv_directory: "./data/historical"
  # Directory to store backtest result files
  results_directory: "./data/backtest_results"

# -----------------------------------------------------------------------------
# Database — PostgreSQL connection for state persistence
# -----------------------------------------------------------------------------
database:
  # Async PostgreSQL connection URL
  # Override via TRADING_BOT_DATABASE__URL environment variable
  url: "postgresql+asyncpg://bot:bot@localhost:5432/trading"
  # Connection pool size (concurrent connections)
  pool_size: 5
  # Maximum overflow connections beyond pool_size
  max_overflow: 10

# -----------------------------------------------------------------------------
# Dashboard — Web monitoring interface settings
# -----------------------------------------------------------------------------
dashboard:
  # Port for the FastAPI dashboard server
  port: 8080
  # Authentication token for API access (override via TRADING_BOT_DASHBOARD__AUTH_TOKEN)
  # Set to null to disable authentication (not recommended for production)
  auth_token: null
  # Allowed CORS origins for the frontend
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

# -----------------------------------------------------------------------------
# Logging — Structured logging configuration
# -----------------------------------------------------------------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Output logs as JSON (true) or human-readable text (false)
  json_output: true
  # Log file path (null = stdout only, set a path for file logging)
  log_file: null

# -----------------------------------------------------------------------------
# Redis — Cache and pub/sub for real-time data
# -----------------------------------------------------------------------------
redis:
  # Redis connection URL
  # Override via TRADING_BOT_REDIS__URL environment variable
  url: "redis://localhost:6379/0"
