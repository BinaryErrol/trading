services:
  trading-bot:
    build: .
    container_name: ibkr-trading-bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - bot-data:/app/data
      - bot-logs:/app/logs
    environment:
      - TRADING_BOT_DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER:-bot}:${POSTGRES_PASSWORD:-bot}@postgres:5432/${POSTGRES_DB:-trading}
      - TRADING_BOT_REDIS__URL=redis://redis:6379/0
      - TRADING_BOT_DASHBOARD__PORT=8080
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - backend
      - frontend

  postgres:
    image: postgres:15-alpine
    container_name: ibkr-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-trading}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ibkr-redis
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - backend

  dashboard-ui:
    build: ./dashboard-ui
    container_name: ibkr-dashboard-ui
    ports:
      - "${UI_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend

volumes:
  postgres-data:
  redis-data:
  bot-data:
  bot-logs:

networks:
  backend:
  frontend:
